<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>RQF Capital Planning Calendar</title>
<style>
  :root{
    --bg:#faf9f7; --surface:#ffffff; --surface-2:#f3f1ec; --border:#e3e0d8;
    --text:#1f1e1c; --muted:#6b6a64; --faint:#95948d;
    --green-bg:#eaf3de; --green-tx:#3b6d11;
    --amber-bg:#faeeda; --amber-tx:#854f0b;
    --red-bg:#fcebeb; --red-tx:#a32d2d;
    --hold-bg:#eeedf2; --hold-tx:#5b5772; --past-bg:#e4e2dc; --past-tx:#9a998f;
    --accent:#185fa5;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1a1a18; --surface:#252420; --surface-2:#2f2e29; --border:#3a3934;
      --text:#f0efe9; --muted:#a7a69f; --faint:#807f78;
      --green-bg:#27500a; --green-tx:#c0dd97;
      --amber-bg:#633806; --amber-tx:#fac775;
      --red-bg:#791f1f; --red-tx:#f7c1c1;
      --hold-bg:#33313d; --hold-tx:#c9c6d6; --past-bg:#242320; --past-tx:#75746d;
      --accent:#85b7eb;
    }
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;}
  .wrap{max-width:920px;margin:0 auto;padding:24px 20px 60px;}
  h1{font-size:20px;font-weight:600;margin:0;}
  .sub{font-size:13px;color:var(--muted);margin-top:2px;}
  .pool{font-size:22px;font-weight:600;margin-top:8px;}
  .head{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:18px;}
  .nav{display:flex;align-items:center;gap:10px;}
  .nav button{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;}
  .nav button:hover{background:var(--surface-2);}
  .nav .mlabel{font-size:15px;font-weight:600;min-width:150px;text-align:center;}
  .navcol{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .watch{background:var(--hold-bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:16px;}
  .watch .wtop{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:10px;}
  .watch .wlabel{font-size:13px;font-weight:600;color:var(--hold-tx);}
  .watch .wsub{font-size:12px;color:var(--muted);margin-top:1px;}
  .pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .pill{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:4px 12px;font-size:12px;color:var(--text);}
  .pill b{color:var(--hold-tx);}
  .stressbtn{border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:8px;padding:7px 12px;font-size:13px;cursor:pointer;white-space:nowrap;}
  .stressbtn.on{background:var(--red-bg);border-color:var(--red-tx);color:var(--red-tx);font-weight:600;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:16px;}
  .card{background:var(--surface-2);border-radius:8px;padding:12px 14px;}
  .card .l{font-size:12px;color:var(--muted);}
  .card .v{font-size:19px;font-weight:600;margin-top:3px;}
  .alert{border-radius:8px;padding:11px 14px;font-size:13px;margin-bottom:16px;}
  .legend{display:flex;flex-wrap:wrap;gap:16px;font-size:12px;color:var(--muted);margin-bottom:8px;align-items:center;}
  .sw{display:inline-block;width:11px;height:11px;border-radius:3px;vertical-align:-1px;margin-right:4px;}
  .dow{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:5px;}
  .dow div{font-size:11px;color:var(--faint);text-align:center;}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .cell{min-height:92px;border-radius:8px;padding:7px 9px;border:1px solid var(--border);cursor:pointer;display:flex;flex-direction:column;gap:1px;position:relative;}
  .cell:hover{outline:2px solid var(--accent);}
  .cell .dn{font-size:11px;color:var(--faint);text-align:right;line-height:1.1;}
  .cell .cap{font-size:11px;color:var(--faint);}
  .cell .sure{font-size:16px;font-weight:600;}
  .cell .prob{font-size:11px;}
  .cell .hd{position:absolute;left:7px;top:6px;font-size:10px;color:var(--hold-tx);}
  .cell.empty{border:none;background:transparent;cursor:default;}
  .cell.empty:hover{outline:none;}
  .detail{margin-top:18px;background:var(--surface-2);border-radius:12px;padding:14px 18px;font-size:13px;color:var(--muted);}
  .detail table{width:100%;border-collapse:collapse;font-size:12px;margin-top:4px;}
  .detail td{padding:2px 10px 2px 0;}
  .foot{margin-top:14px;font-size:11px;color:var(--faint);line-height:1.6;}
  .gen{font-size:12px;color:var(--muted);}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>RQF Capital Planning Calendar</h1>
      <div class="sub">Transactional capital — live from HubSpot</div>
      <div class="gen" id="genLine"></div>
    </div>
    <div class="navcol">
      <div class="nav">
        <button id="prev" aria-label="Previous month">&lsaquo;</button>
        <div class="mlabel" id="mlabel">—</div>
        <button id="next" aria-label="Next month">&rsaquo;</button>
      </div>
      <button class="stressbtn" id="stressBtn">Stress test: off</button>
    </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="legend">
    <span>Cell: <b>Cap</b> · <b>Sure</b> remaining · <b>Prob</b> remaining</span>
    <span><span class="sw" style="background:var(--green-bg)"></span>Sure &amp; Prob &gt; floor</span>
    <span><span class="sw" style="background:var(--amber-bg)"></span>Prob &lt; floor</span>
    <span><span class="sw" style="background:var(--red-bg)"></span>Sure &lt; floor</span>
  </div>

  <div class="dow"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
  <div class="grid" id="grid"></div>

  <div class="watch" id="watch" style="margin-top:16px;margin-bottom:0;"></div>

  <div class="detail" id="detail">Click a day to see the deals reserving capital that day.</div>
  <div class="foot" id="foot"></div>
</div>

<script>
var CFG={pool:1500000,floor:50000,deals:[]};
var cur=new Date(); cur=new Date(cur.getFullYear(),cur.getMonth(),1);
var stress=false;
var MN=["January","February","March","April","May","June","July","August","September","October","November","December"];
function pd(s){var p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function fmtBig(n){var a=Math.abs(n),s=n<0?"-":"";if(a>=1e6)return s+"$"+(a/1e6).toFixed(2)+"M";if(a>=1e3)return s+"$"+Math.round(a/1e3)+"k";return s+"$"+Math.round(a);}
function fmtK(n){var a=Math.abs(n);if(a>=1e6)return "$"+(a/1e6).toFixed(2)+"M";return "$"+Math.round(a/1e3)+"k";}
function activeOn(d,day){return d._s<=day&&day<=d._e;}
function dep(day,layers){var t=0;for(var i=0;i<CFG.deals.length;i++){var d=CFG.deals[i];if(layers.indexOf(d.l)>=0&&activeOn(d,day))t+=d.a;}return t;}

function renderWatch(){
  var oh=CFG.deals.filter(function(d){return d.l==="onhold";});
  var total=oh.reduce(function(s,d){return s+d.a;},0);
  var by={};
  oh.forEach(function(d){var k=d.c.slice(0,7);if(!by[k])by[k]=[0,0];by[k][0]+=d.a;by[k][1]+=1;});
  var pills=Object.keys(by).sort().map(function(k){
    var mn=MN[parseInt(k.slice(5,7),10)-1].slice(0,3);
    return "<span class='pill'>"+mn+" <b>"+fmtK(by[k][0])+"</b> · "+by[k][1]+"</span>";
  }).join("");
  document.getElementById("watch").innerHTML=
    "<div class='wlabel'>Pipeline watch — On Hold, not committed</div>"
    +"<div class='wsub'>"+fmtK(total)+" across "+oh.length+" deals · not in the calendar math</div>"
    +"<div class='pills'>"+pills+"</div>";
  var sb=document.getElementById("stressBtn");
  sb.textContent=stress?"Stress test: ON":"Stress test: off";
  sb.className="stressbtn"+(stress?" on":"");
  sb.onclick=function(){stress=!stress;render();};
}

function render(){
  renderWatch();
  var y=cur.getFullYear(),m=cur.getMonth();
  document.getElementById("mlabel").textContent=MN[m]+" "+y;
  var grid=document.getElementById("grid");grid.innerHTML="";
  var offset=new Date(y,m,1).getDay();
  var dim=new Date(y,m+1,0).getDate();
  for(var i=0;i<offset;i++){var e=document.createElement("div");e.className="cell empty";grid.appendChild(e);}
  var pool=CFG.pool,floor=CFG.floor;
  var TODAY=new Date(); TODAY=new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
  var minSure=Infinity,minBottom=Infinity,red=0,yellow=0,minBottomDay=1;
  for(var day=1;day<=dim;day++){
    var dt=new Date(y,m,day);
    var sureDep=dep(dt,["confirmed"]);
    var probDep=dep(dt,["confirmed","probable"]);
    var holdDep=dep(dt,["onhold"]);
    var sureRem=pool-sureDep;
    var bottomDep=stress?(probDep+holdDep):probDep;
    var bottomRem=pool-bottomDep;
    var isPast = dt < TODAY;
    var bg,btx,sureCol;
    if(isPast){
      bg="var(--past-bg)";btx="var(--past-tx)";sureCol="var(--past-tx)";
    }else{
      if(sureRem<minSure)minSure=sureRem;
      if(bottomRem<minBottom){minBottom=bottomRem;minBottomDay=day;}
      if(sureRem<floor){bg="var(--red-bg)";btx="var(--red-tx)";red++;}
      else if(bottomRem<floor){bg="var(--amber-bg)";btx="var(--amber-tx)";yellow++;}
      else{bg="var(--green-bg)";btx="var(--green-tx)";}
      sureCol=sureRem<floor?"var(--red-tx)":"var(--text)";
    }
    var lblB=stress?"Stress":"Prob";
    var hold=holdDep>0?"<div class='hd'>+"+fmtK(holdDep)+" hold</div>":"";
    var c=document.createElement("div");c.className="cell";c.style.background=bg;
    c.innerHTML=hold+"<div class='dn'>"+day+"</div>"+
      "<div class='cap'>Cap "+fmtBig(pool)+"</div>"+
      "<div class='sure' style='color:"+sureCol+"'>"+fmtBig(sureRem)+"</div>"+
      "<div class='prob' style='color:"+btx+"'>"+lblB+" "+fmtBig(bottomRem)+"</div>";
    (function(dt){c.onclick=function(){showDay(dt);};})(dt);
    grid.appendChild(c);
  }
  document.getElementById("cards").innerHTML=
    card("Total capital",fmtBig(pool))+
    card("Lowest After Sure Bets",fmtBig(minSure),minSure<floor)+
    card(stress?"Lowest After Sure, Approved &amp; Hold":"Lowest After Sure and Approved",fmtBig(minBottom),minBottom<floor)+
    card("On-hold pipeline",fmtBig(CFG.deals.filter(function(d){return d.l==="onhold";}).reduce(function(s,d){return s+d.a;},0)));
}
function card(l,v,danger){return "<div class='card'><div class='l'>"+l+"</div><div class='v' style='"+(danger?"color:var(--red-tx)":"")+"'>"+v+"</div></div>";}
function al(bg,tx,msg){return "<div class='alert' style='background:"+bg+";color:"+tx+"'>"+msg+"</div>";}

function grp(title,color,arr){
  if(!arr.length) return "";
  var sub=arr.reduce(function(s,x){return s+x.a;},0);
  var rows=arr.slice().sort(function(a,b){return b.a-a.a;}).map(function(x){
    var warn=x.err?" <span title='"+(x.note||"HubSpot record needs review")+"' style='color:var(--amber-tx)'>&#9888;</span>":"";
    return "<tr><td style='color:var(--text)'>"+x.n+warn+"</td><td style='color:var(--muted)'>"+x.t+"</td><td style='text-align:right;color:var(--text);white-space:nowrap'>"+fmtK(x.a)+"</td></tr>";
  }).join("");
  return "<div style='margin-top:12px'><div style='font-size:12px;font-weight:600;color:"+color+";margin-bottom:2px'>"+title+" — "+fmtK(sub)+" · "+arr.length+" deal"+(arr.length>1?"s":"")+"</div><table>"+rows+"</table></div>";
}
function showDay(dt){
  var det=document.getElementById("detail");
  var lbl=MN[dt.getMonth()].slice(0,3)+" "+dt.getDate();
  var ds=CFG.deals.filter(function(d){return activeOn(d,dt);});
  var funded=ds.filter(function(x){return x.f;});
  var sure=ds.filter(function(x){return x.l==="confirmed"&&!x.f;});
  var prob=ds.filter(function(x){return x.l==="probable";});
  var hold=ds.filter(function(x){return x.l==="onhold";});
  var sureRem=CFG.pool-dep(dt,["confirmed"]);
  var probRem=CFG.pool-dep(dt,["confirmed","probable"]);
  if(!funded.length&&!sure.length&&!prob.length&&!hold.length){
    det.innerHTML="<b style='color:var(--text)'>"+lbl+"</b> — no capital reserved. Full "+fmtBig(CFG.pool)+" available.";return;}
  det.innerHTML="<div style='font-size:14px;color:var(--text)'><b>"+lbl+"</b> — Cap "+fmtBig(CFG.pool)+" &middot; Sure "+fmtBig(sureRem)+" &middot; Prob "+fmtBig(probRem)+(probRem<CFG.floor?" (under floor)":"")+"</div>"
    +grp("Funded — wired &amp; live","var(--green-tx)",funded)
    +grp("Sure — committed, not yet wired","var(--text)",sure)
    +grp("Probable — 02 approved","var(--amber-tx)",prob)
    +grp("On Hold — pipeline, not committed","var(--hold-tx)",hold);
}
document.getElementById("prev").onclick=function(){cur=new Date(cur.getFullYear(),cur.getMonth()-1,1);render();};
document.getElementById("next").onclick=function(){cur=new Date(cur.getFullYear(),cur.getMonth()+1,1);render();};

fetch("./data.json?_="+Date.now()).then(function(r){return r.json();}).then(function(j){
  CFG.pool=j.pool||1500000; CFG.floor=j.floor||50000;
  CFG.deals=(j.deals||[]).map(function(d){d._s=pd(d.s);d._e=pd(d.e);if(!d.c)d.c=d.e;return d;});
  if(j.generated){var g=new Date(j.generated);document.getElementById("genLine").textContent="Updated "+g.toLocaleString();}
  document.getElementById("foot").textContent=j.notes||"";
  render();
}).catch(function(e){document.getElementById("grid").innerHTML="<div style='color:var(--red-tx);padding:20px'>Could not load data.json — "+e+"</div>";});
</script>
</body>
</html>
